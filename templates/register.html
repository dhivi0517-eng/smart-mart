{% extends "base.html" %}
{% block content %}

<div class="glass-panel" style="max-width: 500px; width: 100%; margin: 2rem auto;">

    <h2 class="text-center">Create Account</h2>

    <form method="POST">

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter Email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <div class="form-group">
            <label>Role</label>
            <select name="role" id="roleSelect" onchange="toggleShop()" required>
                <option value="">Select Role</option>
                <option value="owner">Shop Owner</option>
                <option value="customer">Customer</option>
            </select>
        </div>

        <div id="shopFields" style="display:none;">
            <div class="form-group">
                <label>Shop Name</label>
                <input type="text" name="shop_name" placeholder="Shop Name">
            </div>
            <div class="form-group">
                <label>Shop Address</label>
                <input type="text" name="shop_address" placeholder="Shop Address">
            </div>
        </div>

        <button class="btn" style="width: 100%;">Register</button>

    </form>

    <p class="text-center mt-3">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>

</div>

<script>
function toggleShop(){
    let role = document.getElementById("roleSelect").value;
    let shopBox = document.getElementById("shopFields");

    if(role === "owner"){
        shopBox.style.display = "block";
    } else {
        shopBox.style.display = "none";
    }
}
</script>

{% endblock %}
