<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <!-- Background linear gradient matching MiniMartPro glassmorphism background -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>
        <!-- Glowing primary & secondary linear gradient for the icon -->
        <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#c084fc" />
        </linearGradient>
        <!-- Soft background glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Outer Rounded Background -->
    <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />

    <!-- Ambient glowing circle in the center background -->
    <circle cx="200" cy="130" r="50" fill="#38bdf8" opacity="0.12" filter="url(#glow)" />

    <!-- Sleek Shopping Bag Icon -->
    <g transform="translate(165, 80)" filter="drop-shadow(0px 8px 16px rgba(56, 189, 248, 0.25))">
        <!-- Bag Handle -->
        <path d="M 23 25 C 23 8, 47 8, 47 25" fill="none" stroke="url(#glowGrad)" stroke-width="4.5" stroke-linecap="round" />
        <!-- Bag Body -->
        <path d="M 12 25 L 58 25 C 62 25, 65 28, 64 32 L 59 75 C 58 79, 54 82, 50 82 L 20 82 C 16 82, 12 79, 11 75 L 6 32 C 5 28, 8 25, 12 25 Z" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-linejoin="round" />
        <!-- Accent lines inside the bag to look premium and digital -->
        <path d="M 25 42 L 45 42" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.8" />
        <path d="M 20 54 L 50 54" stroke="url(#glowGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6" />
        <path d="M 28 66 L 42 66" stroke="#c084fc" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    </g>

    <!-- Professional Text Details -->
    <text x="200" y="215" font-family="'Outfit', 'Inter', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle" letter-spacing="0.5">
        MiniMartPro
    </text>
    <text x="200" y="238" font-family="'Outfit', 'Inter', -apple-system, sans-serif" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.3" opacity="0.8">
        No Image Available
    </text>
</svg>
